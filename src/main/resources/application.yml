server:
  port: 8080

spring:
  application:
    name: nimbusboard-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false

app:
  redis:
    enabled: ${REDIS_ENABLED:false}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000     # 15 minutes
    refresh-token-expiration-ms: 604800000 # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  openai:
    api-key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL:gemini-2.0-flash}
    base-url: ${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
    max-tokens: ${OPENAI_MAX_TOKENS:2000}

  rate-limit:
    ai-requests-per-minute: ${AI_RATE_LIMIT:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.nimbusboard: DEBUG
    org.springframework.web.socket: DEBUG
